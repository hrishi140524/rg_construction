<header class="header">

  <div class="header-container">

    <!-- LOGO -->
    <a routerLink="/" class="logo">
      <span class="rg">RG</span>
      <span class="name">Construction</span>
    </a>

    <!-- NAVIGATION -->
    <nav class="nav" [class.active]="menuOpen">

      <a [routerLink]="['/']" fragment="home" (click)="closeMenu()">Home</a>

      <a routerLink="/" fragment="about" (click)="closeMenu()">About</a>

      <a [routerLink]="['/']" fragment="services" (click)="closeMenu()">Services</a>

      <a [routerLink]="['/']" fragment="projects" (click)="closeMenu()">Projects</a>

      <a [routerLink]="['/']" fragment="contact" (click)="closeMenu()">Contact</a>

    </nav>

    <!-- ACTION BUTTONS -->
    <div class="header-actions">

      <!-- CALL -->
      <a href="tel:+919822069294" class="call-btn">
        📞
        <span>Call</span>
      </a>

      <!-- WHATSAPP -->
      <a
        href="https://wa.me/919822069294"
        target="_blank"
        class="whatsapp-btn"
      >
        💬
      </a>

    </div>

    <!-- HAMBURGER -->
    <div class="hamburger" (click)="toggleMenu()">

      <span></span>
      <span></span>
      <span></span>

    </div>

  </div>

  <!-- MOBILE OVERLAY -->
  <div
  class="overlay"
  *ngIf="menuOpen"
  (click)="closeMenu()">
  </div>

</header>
