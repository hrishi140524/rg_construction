<header class="header">
    <div class="header-container">
  
      <!-- LOGO -->
      <div class="logo">
        <span class="rg">RG</span>
        <span class="name">Construction</span>
      </div>
  
      <!-- NAVIGATION -->
      <nav class="nav" [class.active]="menuOpen">
        <a routerLink="/" (click)="closeMenu()">Home</a>
        <a routerLink="/about" (click)="closeMenu()">About</a>
        <a routerLink="/services" (click)="closeMenu()">Services</a>
        <a routerLink="/projects" (click)="closeMenu()">Projects</a>
        <a routerLink="/contact" (click)="closeMenu()">Contact</a>
  
        <!-- Mobile CTA -->
        <a routerLink="/contact" class="mobile-btn" (click)="closeMenu()">
          Get Quote
        </a>
      </nav>
  
      <!-- RIGHT SECTION (Desktop) -->
      <div class="right-section">
  
        <!-- Phone -->
        <a href="tel:+919876543210" class="icon-btn phone">
          <svg viewBox="0 0 24 24">
            <path d="M6.6 10.8a15 15 0 006.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.3
            1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V21c0 .6-.4 1-1 1C10.3 22 2 13.7
            2 3c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.3
            1.1l-2.2 2.2z"/>
          </svg>
          <span>+91 98765 43210</span>
        </a>
  
        <!-- WhatsApp -->
        <a href="https://wa.me/919876543210"
           target="_blank"
           class="icon-btn whatsapp">
          <svg viewBox="0 0 24 24">
            <path d="M20 4A10 10 0 004 20l-1 4 4-1A10 10 0 1020 4zm-8
            15a7 7 0 01-3.6-1l-.3-.2-2.3.6.6-2.2-.2-.3A7 7 0 1112 19zm3.9-5.3c-.2-.1-1.2-.6-1.4-.7-.2-.1-.4-.1-.5.1-.2.2-.6.7-.7.8-.1.1-.2.1-.4
            0-.2-.1-.9-.3-1.7-1-.6-.6-1-1.3-1.1-1.5-.1-.2 0-.3.1-.4.1-.1.2-.2.3-.3.1-.1.1-.2.2-.3.1-.1 0-.3 0-.4 0-.1-.5-1.3-.7-1.7-.2-.4-.4-.4-.5-.4h-.4c-.1
            0-.3 0-.4.2-.2.2-.7.7-.7 1.8s.7 2.1.8 2.2c.1.1 1.4 2.2 3.4 3 .5.2
            1 .3 1.3.4.5.2 1 .1 1.3.1.4-.1 1.2-.5 1.3-1 .2-.5.2-.9.1-1 0-.1-.2-.2-.4-.3z"/>
          </svg>
        </a>
  
        <!-- CTA -->
        <a routerLink="/contact" class="desktop-btn">
          Get Quote
        </a>
  
      </div>
  
      <!-- HAMBURGER -->
      <div class="hamburger" (click)="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
  
    </div>
  
    <!-- Overlay -->
    <div class="overlay" *ngIf="menuOpen" (click)="closeMenu()"></div>
  </header>
